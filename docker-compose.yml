services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend:/app
      - backend_modules:/app/node_modules
      - /Users/mees/Downloads:/Users/mees/Downloads:ro
    command: sh -c "npm install && npx nodemon server.js"

  frontend:
    build:
      context: ./frontend
      target: builder
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  backend_modules:
  frontend_modules:
