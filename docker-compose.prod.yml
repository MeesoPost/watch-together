services:
  watch-together:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3002
      - FRONTEND_URL=http://100.90.84.95:3002
    volumes:
      - /mnt/nas:/mnt/nas:ro
